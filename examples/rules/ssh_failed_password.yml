title: Failed SSH Password Authentication
id: 1a2b3c4d-5e6f-7890-abcd-ef1234567890
status: experimental
description: |
  Detects failed SSH password authentication attempts in /var/log/auth.log.
  Pair with a frequency aggregation in your SIEM (5+ failures from one src_ip
  in 60s) to catch SSH brute force. This is the same primitive LogHound
  (https://github.com/B0bTheSkull/loghound) detects in its auth-log mode.
references:
  - https://attack.mitre.org/techniques/T1110/001/
author: B0bTheSkull
date: 2026/03/14
modified: 2026/03/14
tags:
  - attack.credential_access
  - attack.t1110.001
logsource:
  product: linux
  service: auth
detection:
  failed_password:
    Image|endswith: '/sshd'
    Message|contains:
      - 'Failed password'
      - 'authentication failure'
  condition: failed_password
fields:
  - SourceIP
  - User
falsepositives:
  - Misconfigured SSH clients retrying with the wrong key/password
  - Automated configuration management agents with stale credentials
level: medium
